      - name: Run Loop12
        env:
          EMAIL_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          echo "🚀 开始循环..."

          for i in {1..180}
          do
            echo "============================"
            echo "🔁 第 $i 次循环"
            date

            echo "📨 Step1: 发送邮件"
            node script.js || echo "⚠️ 发邮件失败，继续下一步"

            echo "⏳ Step2: 等待邮件"
            sleep 20

            echo "📬 Step3: 读取邮件 + 激活"

            case "$i" in
              1|11|21|31|41|51)
                echo "🖥️ 第 $i 次循环：激活后执行 tmux + zzz.sh"
                INIT_TMUX=1 python read_and_activate2.py || echo "⚠️ 激活失败，不影响下一轮"
                ;;
              *)
                echo "ℹ️ 第 $i 次循环：只激活，不执行 tmux"
                python read_and_activate2.py || echo "⚠️ 激活失败，不影响下一轮"
                ;;
            esac

            echo "✅ 第 $i 次循环完成"
            echo "⏸ 等待2分钟后进入下一轮..."
            sleep 120
            echo "➡️ 准备进入下一轮..."
          done

          echo "🎉 循环完成"
