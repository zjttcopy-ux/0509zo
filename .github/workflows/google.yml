name: Zo Full Auto

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ✅ 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Node（Playwright）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps

      # ✅ Python（处理邮箱）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: pip install requests

      # ✅ Step 1：发送邮件
      - name: Send Mail (Playwright)
        run: node script.js

      # ✅ Step 2：等待邮件到达
      - name: Wait for mail
        run: sleep 20

      # ✅ Step 3：读取邮件 + 激活（调用 activate.js）
      - name: Read & Activate
        env:
          EMAIL_PASSWORD: ${{ secrets.PASSWORD }}
        run: python read_and_activate.py
