name: Zo Full Auto Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4,10,23 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ✅ 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Node（Playwright）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps

      # ✅ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: pip install requests

      # ✅ ✅ ✅ 核心循环
      - name: Run Loop
        env:
          EMAIL_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          echo "🚀 开始6小时循环..."

          for i in {1..180}
          do
            echo "============================"
            echo "🔁 第 $i 次循环"
            date

            echo "📨 Step1: 发送邮件"
            node script.js || echo "⚠️ 发邮件失败，继续下一步"

            echo "⏳ Step2: 等待邮件"
            sleep 20

            echo "📬 Step3: 读取邮件 + 激活"
            python read_and_activate.py || echo "⚠️ 激活失败，不影响下一轮"

            echo "⏸ 等待2分钟..."
            sleep 120
          done

          echo "🎉 6小时循环完成"
