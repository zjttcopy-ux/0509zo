name: Zo Auto Flow

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Node (Playwright)
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install playwright
      - run: npx playwright install --with-deps

      # ✅ Python（读邮箱）
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install requests

      # ✅ 1️⃣ 触发邮箱发送
      - name: Run Playwright
        run: node script.js

      # ✅ 2️⃣ 等邮件
      - name: Wait
        run: sleep 20

      # ✅ 3️⃣ 读取邮件 + 激活
      - name: Activate
        env:
          EMAIL_PASSWORD: ${{ secrets.PASSWORD }}
        run: python read_and_activate.py
