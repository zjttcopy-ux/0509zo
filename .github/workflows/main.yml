name: Auto Signup Task2

on:
  # ✅ 建议：一天触发一次（脚本内部会跑 6 小时）
  schedule:
    # UTC 22:00 = 北京时间 06:00
    - cron: '0 4 * * *'

  # ✅ 允许你在 GitHub 页面手动点 Run
  workflow_dispatch:

  # ✅ 推送 main 分支也会触发（调试用，可留可删）
  push:
    branches:
      - main

jobs:
  run-automation:
    runs-on: ubuntu-latest

    # ✅ 6 小时 + 余量，防止 GitHub 强制中断
    timeout-minutes: 390

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run signup automation (6-hour loop)
        run: node script.js

      # ✅ 无论成功还是失败，都上传所有截图
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signup-screenshots
          path: |
            result_*.png
            error_*.png
